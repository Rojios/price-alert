timezone: "Asia/Bangkok"

watchlist:
  - symbol: "XAUUSD=X"
    name: "Gold Spot (XAUUSD)"
    alerts:
      - type: price_above
        threshold: 4700
        message: "Gold breaking key resistance!"
      - type: price_below
        threshold: 4400
        message: "Gold dropping below support!"
      - type: pct_change
        threshold: 1.5
        message: "Gold making a big move today."

  - symbol: "PTT.BK"
    name: "PTT PCL (SET)"
    alerts:
      - type: price_above
        threshold: 35.0
        message: "PTT above target."
      - type: price_below
        threshold: 28.0
        message: "PTT below stop-loss zone."
      - type: pct_change
        threshold: 2.0
        message: "PTT moving significantly."

  # Add more symbols below, e.g.:
  # - symbol: "KBANK.BK"
  #   name: "Kasikorn Bank"
  #   alerts:
  #     - type: price_above
  #       threshold: 145.0
  #     - type: pct_change
  #       threshold: 3.0

# ── Daily Report ─────────────────────────────────────────────────────────────
daily_report:
  time: "17:00"          # Bangkok time (ICT, UTC+7)
  days: [0,1,2,3,4]      # 0=Mon … 4=Fri (trading days only)
  symbols:
    - symbol: "^SET.BK"
      name: "SET Index"
    - symbol: "SAPPE.BK"
      name: "SAPPE"
    - symbol: "NSL.BK"
      name: "NSL"
    - symbol: "SISB.BK"
      name: "SISB"
    - symbol: "BH.BK"
      name: "BH"
    - symbol: "TIDLOR.BK"
      name: "TIDLOR"
