timezone: "Asia/Bangkok"

watchlist:
  - symbol: "XAUUSD=X"
    name: "Gold Spot (XAUUSD)"
    alerts:
      - type: price_above
        threshold: 4700
        message: "Gold breaking key resistance!"
      - type: price_below
        threshold: 4400
        message: "Gold dropping below support!"
      - type: pct_change
        threshold: 1.5
        message: "Gold making a big move today."

  - symbol: "PTT.BK"
    name: "PTT PCL (SET)"
    alerts:
      - type: price_above
        threshold: 35.0
        message: "PTT above target."
      - type: price_below
        threshold: 28.0
        message: "PTT below stop-loss zone."
      - type: pct_change
        threshold: 2.0
        message: "PTT moving significantly."

